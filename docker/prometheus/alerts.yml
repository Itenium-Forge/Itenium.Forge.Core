groups:
  - name: aspnetcore
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
          /
          sum(rate(http_server_request_duration_seconds_count[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.service_name }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency above 1s on {{ $labels.service_name }}"
          description: "P99 latency is {{ $value | humanizeDuration }} (threshold: 1s)"

      - alert: ServiceDown
        expr: absent(http_server_request_duration_seconds_count) == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No HTTP metrics received — service may be down"
